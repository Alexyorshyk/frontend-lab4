
<!DOCTYPE html><html lang='uk'><head><meta charset='UTF-8'><title>Віза</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f9; padding:20px; }
h2 { color:#2c3e50; }
form { background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); max-width:500px; }
label { display:block; margin-top:10px; font-weight:bold; }
input, select, textarea { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px; }
button { margin-top:15px; padding:10px 20px; background:#3498db; border:none; color:white; border-radius:4px; cursor:pointer; }
button:hover { background:#2980b9; }
</style>
</head>
<body><h2>Віза-анкета</h2>
<form>
<fieldset><legend>Паспортні дані</legend>
<input placeholder='Серія'><br><input placeholder='Номер'><br>
<label>Дата видачі:</label><input type='date'><br>
<input placeholder='Орган видачі'><br></fieldset>
<fieldset><legend>Поїздка</legend>
<input placeholder='Мета поїздки'><br>
<label>Дата початку:</label><input type='date'><br>
<label>Дата завершення:</label><input type='date'><br></fieldset>
<fieldset><legend>Фінанси</legend>
<input type='radio' name='inc' value='job'> Офіційна робота<br>
<input type='radio' name='inc' value='biz'> Бізнес<br>
<label>Банківська виписка:</label><input type='file'><br>
</fieldset>
<button type='submit'>Відправити</button>
</form></body></html>
